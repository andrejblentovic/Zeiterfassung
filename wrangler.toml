# Wrangler-Konfiguration für Cloudflare Pages
# Wird für Deployment per Dashboard-Git-Integration NICHT benötigt (dort reicht die
# Verbindung im Dashboard). Nötig ist sie nur, wenn per Wrangler-CLI deployed wird:
#
#   npx wrangler pages deploy .
#
# Voraussetzung: Wrangler >= 3.45.0

name = "zeiterfassung"
pages_build_output_dir = "."
compatibility_date = "2026-07-18"
